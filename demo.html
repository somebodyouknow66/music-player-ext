<style>
  * {
    box-sizing: border-box;
    font-family: sans-serif;
    margin: 0;
    padding: 0;
  }
</style>

<div id="screen">
  <div id="coverImage"></div>
  <div id="search"></div>
  <div class="playerBody">
    <div id="info">
      <h4 id="title">Sky Full of Stars</h4>
      <h3 id="artist">Coldplay</h3>
    </div>
    <div class="controls">
      <button id="backward" class="control-btn">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          width="32"
          height="32"
        >
          <rect x="5" y="5" width="2" height="14" />
          <path d="M18 5L8 12l10 7z" />
        </svg>
      </button>

      <button id="play">
        <svg
          id="playIcon"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
           width="32"
          height="32"
        >
          <rect x="6" y="5" width="4" height="14" rx="1" />
          <rect x="14" y="5" width="4" height="14" rx="1" />
        </svg>
        <svg
          id="pauseIcon"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
           width="32"
          height="32"
        >
          <path d="M8 5v14l11-7z" />
        </svg>
      </button>

      <button id="forward" class="controlbtn">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
           width="32"
          height="32"
        >
          <rect x="17" y="5" width="2" height="14" />
          <path d="M6 5l10 7-10 7z" />
        </svg>
      </button>
    </div>
  </div>
</div>
