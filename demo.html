<style>
@import url('https://fonts.googleapis.com/css2?family=Crafty+Girls&display=swap');

html, body {
    margin: 0;
    padding: 0;
    font-family: "Crafty Girls", cursive;
  } 

#screen {
  position: relative;
  width: 280px;
  height: 280px;
  background: #fff;
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.4);
}

#search {
  position: absolute;
  top: 18px;
  right: 18px;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: rgba(17, 17, 17, 0.35);
  color: #fff;
  cursor: pointer;
  transition: background 0.15s linear, color 0.15s linear, transform 0.3s ease-in-out; 
}

#search:hover {
   color: #96c5f7;
   transform: scale(1.2);
} 




  #title {
    margin: 0;
    padding: 0;
    font-size: 10px;
    line-height: 10px;
    letter-spacing: 2.5px;
    font-weight: 700;
    color: black; /* color is temporary */
  }

#artist {
    margin: 0;
    padding: 0; 
    font-size: 11px;
    line-height: 11px;
    font-weight: 400;
    color: black; /* color is temporary */

}

#titlePlaying {
    margin: 0 0 5px 29px;
    padding: 0;
    font-size: 14px;
    line-height: 14px;
    font-weight: 700;
    color: black; /* color is temporary */
}


  
</style>

<div id="screen">
  <div id="coverImage"></div>
  <div id="search">
    <svg
    xmlns="http://www.w3.org/2000/svg"
    width="24"
    height="24"
    viewBox="0 0 24 24"
    fill="none"
    stroke="currentColor"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
>
    <circle cx="11" cy="11" r="7" />
    <line x1="16.65" y1="16.65" x2="21" y2="21" />
</svg>
  </div>
  <div class="playerBody">
    <div id="info">
      <p id="title">Sky Full of Stars</h4>
      <p id="artist">Coldplay</h3>
    </div>
    <div class="controls">
      <button id="backward" class="control-btn">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          width="32"
          height="32"
        >
          <rect x="5" y="5" width="2" height="14" />
          <path d="M18 5L8 12l10 7z" />
        </svg>
      </button>

      <button id="play">
        <svg
          id="playIcon"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          width="32"
          height="32"
        >
          <rect x="6" y="5" width="4" height="14" rx="1" />
          <rect x="14" y="5" width="4" height="14" rx="1" />
        </svg>
        <svg
          id="pauseIcon"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          width="32"
          height="32"
        >
          <path d="M8 5v14l11-7z" />
        </svg>
      </button>

      <button id="forward" class="controlbtn">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          width="32"
          height="32"
        >
          <rect x="17" y="5" width="2" height="14" />
          <path d="M6 5l10 7-10 7z" />
        </svg>
      </button>
    </div>

    <div class="other-controls">
      <button id="like">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
          width="32"
          height="32"
        >
          <path
            d="M12 20.5
           3.8 12.8
           A4.8 4.8 0 0 1 10.6 6
           L12 7.4
           L13.4 6
           A4.8 4.8 0 0 1 20.2 12.8
           Z"
          />
        </svg>
      </button>
      <button id="shuffle">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          width="32"
          height="32"
        >
          <path d="M16 3h5v5" />
          <path d="M4 20l16-16" />
          <path d="M15 15l5 5" />
          <path d="M20 15v5h-5" />
          <path d="M4 4l5 5" />
        </svg>
      </button>
      <button id="repeat">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          width="32"
          height="32"
        >
          <path d="M17 2l4 4-4 4" />
          <path d="M3 11V9a3 3 0 013-3h15" />
          <path d="M7 22l-4-4 4-4" />
          <path d="M21 13v2a3 3 0 01-3 3H3" />
        </svg>
      </button>
      <button id="options">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          width="32"
          height="32"
        >
          <circle cx="12" cy="5" r="2" />
          <circle cx="12" cy="12" r="2" />
          <circle cx="12" cy="19" r="2" />
        </svg>
      </button>
    </div>

    <div id="currentPlaying">
        <h2 id="titlePlaying">Sky Full Of Stars</h2>
    </div>
  </div>
</div>
